tool:
  type: function
  function:
    name: web_search
    description: "搜索互联网获取实时信息（天气、新闻、最新研究、代码仓库、开源项目、数据集等）。Search the web for current information including weather, news, recent research, code repositories, open-source projects, datasets, and any real-time facts not available in the paper."
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "Search query string"
        max_results:
          type: integer
          description: "Number of results to return (1-5)"
          default: 3
        search_depth:
          type: string
          description: "basic for quick results, advanced for deeper analysis"
          enum: ["basic", "advanced"]
          default: "basic"
      required:
        - query
runtime:
  entrypoint: web_search.py
  callable: run
